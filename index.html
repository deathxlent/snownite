<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>雪夜打雪仗 - Snow Nite</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      touch-action: none;
    }
    
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    
    #main-menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      z-index: 100;
    }
    
    #main-menu h1 {
      font-size: 4rem;
      color: white;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
      margin-bottom: 1rem;
    }
    
    @media (max-width: 600px) {
      #main-menu h1 {
        font-size: 2.5rem;
      }
      #main-menu .subtitle {
        font-size: 1rem;
      }
      .menu-btn {
        width: 220px;
        padding: 0.8rem 1.5rem;
        font-size: 1rem;
      }
      #connect-menu input {
        width: 220px;
      }
    }
    
    #main-menu .subtitle {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.9);
      margin-bottom: 3rem;
    }
    
    .menu-btn {
      width: 280px;
      padding: 1rem 2rem;
      margin: 0.5rem;
      font-size: 1.2rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: bold;
    }
    
    .menu-btn.primary {
      background: linear-gradient(45deg, #00c6fb 0%, #005bea 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(0, 91, 234, 0.4);
    }
    
    .menu-btn.secondary {
      background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
    }
    
    .menu-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    
    .menu-btn:active {
      transform: translateY(0);
    }
    
    #connect-menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      z-index: 100;
    }
    
    #connect-menu input {
      width: 280px;
      padding: 1rem;
      margin: 0.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      outline: none;
    }
    
    #game-ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: none;
      z-index: 50;
    }
    
    #game-ui.active {
      display: block;
    }
    
    #back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 0.8rem 1.5rem;
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      pointer-events: auto;
      font-size: 1rem;
    }
    
    #back-btn:hover {
      background: rgba(0,0,0,0.7);
    }
    
    #player-count {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 0.8rem 1.5rem;
      background: rgba(0,0,0,0.5);
      color: white;
      border-radius: 25px;
      font-size: 1rem;
    }
    
    #controls-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.8rem 1.5rem;
      background: rgba(0,0,0,0.5);
      color: white;
      border-radius: 25px;
      font-size: 0.9rem;
      text-align: center;
    }
    
    #snowball-count {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5rem 1.5rem;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 20px;
      font-size: 1.1rem;
      font-weight: bold;
      z-index: 45;
    }
    
    #gather-progress-bar {
      position: absolute;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 15px;
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.3);
      display: none;
      z-index: 45;
    }
    
    #gather-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4a90d9, #67b26f);
      border-radius: 6px;
      transition: width 0.05s linear, background 0.3s ease;
    }
    
    #gather-countdown {
      position: absolute;
      bottom: 205px;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.3rem 0.8rem;
      background: rgba(0,0,0,0.7);
      color: #67b26f;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: bold;
      display: none;
      z-index: 45;
    }
    
    #consecutive-count {
      position: absolute;
      bottom: 235px;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.4rem 1rem;
      background: rgba(74, 144, 217, 0.8);
      color: white;
      border-radius: 15px;
      font-size: 1rem;
      font-weight: bold;
      display: none;
      z-index: 45;
      transition: all 0.2s ease;
    }
    
    #consecutive-count.speedup {
      background: linear-gradient(90deg, #67b26f, #4a90d9);
      animation: bounce 0.3s ease;
    }
    
    #gather-speed {
      position: absolute;
      bottom: 265px;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.3rem 0.8rem;
      background: rgba(103, 178, 111, 0.9);
      color: white;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: bold;
      display: none;
      z-index: 45;
      animation: glow 1s infinite alternate;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.1); }
    }
    
    @keyframes glow {
      from { box-shadow: 0 0 5px rgba(103, 178, 111, 0.5); }
      to { box-shadow: 0 0 15px rgba(103, 178, 111, 0.8); }
    }
    
    #charge-indicator {
      position: absolute;
      bottom: 265px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.5rem 1.2rem;
      background: rgba(0,0,0,0.7);
      border-radius: 20px;
      z-index: 45;
    }
    
    #charge-ring-visual {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #f39c12;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    #charge-ring-visual.charged {
      border-top-color: #e74c3c;
      animation: spin 0.5s linear infinite, pulse-charge 0.5s ease-in-out infinite alternate;
    }
    
    #charge-text {
      color: white;
      font-weight: bold;
      font-size: 0.9rem;
    }
    
    #charge-text.charged {
      color: #e74c3c;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse-charge {
      from { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
      to { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
    }
    
    #pointer-lock-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 1.5rem 3rem;
      background: rgba(0,0,0,0.7);
      color: white;
      border-radius: 15px;
      font-size: 1.2rem;
      text-align: center;
      pointer-events: auto;
      cursor: pointer;
      display: none;
      z-index: 55;
    }
    
    #pointer-lock-hint.active {
      display: block;
    }
    
    #touch-controls {
      position: absolute;
      bottom: 40px;
      left: 0;
      width: 100%;
      display: none;
      justify-content: space-between;
      padding: 0 40px;
      pointer-events: auto;
      z-index: 60;
    }
    
    #touch-controls.active {
      display: flex;
    }
    
    .joystick {
      width: 130px;
      height: 130px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      position: relative;
      border: 3px solid rgba(255,255,255,0.3);
      touch-action: none;
    }
    
    .joystick-label {
      position: absolute;
      bottom: -25px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 0.75rem;
      white-space: nowrap;
    }
    
    .joystick-knob {
      width: 55px;
      height: 55px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      touch-action: none;
    }
    
    .hidden {
      display: none !important;
    }
    
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 1.5rem;
      display: none;
    }
    
    #loading.active {
      display: block;
    }
    
    #stamina-bar {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      width: 250px;
      height: 20px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.3);
      display: none;
      z-index: 45;
    }
    
    #stamina-fill {
      height: 100%;
      background: #2ecc71;
      border-radius: 8px;
      transition: width 0.1s ease, background-color 0.2s ease;
    }
    
    #sprint-btn {
      width: 90px;
      height: 90px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.4);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none;
      pointer-events: auto;
      font-size: 0.9rem;
      color: white;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }
    
    #sprint-btn:active {
      background: rgba(74, 144, 217, 0.5);
      transform: scale(0.95);
    }
    
    #sprint-btn.sprinting {
      background: rgba(74, 144, 217, 0.6);
    }
    
    #gather-btn {
      width: 90px;
      height: 90px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.4);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none;
      pointer-events: auto;
      font-size: 0.9rem;
      color: white;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }
    
    #gather-btn:active {
      background: rgba(103, 178, 111, 0.5);
      transform: scale(0.95);
    }
    
    #gather-btn.gathering {
      background: rgba(103, 178, 111, 0.6);
      animation: pulse 0.8s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    #throw-btn {
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.4);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none;
      pointer-events: auto;
      font-size: 0.9rem;
      color: white;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }
    
    #throw-btn:active {
      background: rgba(243, 156, 18, 0.5);
      transform: scale(0.95);
    }
    
    #throw-btn.throwing {
      background: rgba(243, 156, 18, 0.6);
    }
    
    #throw-btn.throwing.charged {
      background: rgba(231, 76, 60, 0.7);
      animation: pulse 0.5s infinite;
    }
    
    #charge-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top-color: #f39c12;
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    #throw-btn.throwing #charge-ring {
      opacity: 1;
      animation: spin 1s linear infinite;
    }
    
    #throw-btn.throwing.charged #charge-ring {
      border-top-color: #e74c3c;
      animation: spin 0.5s linear infinite;
    }
    
    .right-controls {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 20px;
    }
    
    .left-controls {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    
    <div id="loading">加载中...</div>
    
    <div id="main-menu">
      <h1>⛄ 雪夜打雪仗</h1>
      <p class="subtitle">越肩视角 · 可单机可联机</p>
      <button class="menu-btn primary" id="btn-single">🎮 单机游戏</button>
      <button class="menu-btn secondary" id="btn-multi">🌐 联机游戏</button>
    </div>
    
    <div id="connect-menu">
      <h1>🌐 联机游戏</h1>
      <p class="subtitle">输入服务器地址连接</p>
      <input type="text" id="server-address" placeholder="服务器地址 (例如: ws://192.168.1.100:8765)" value="ws://localhost:8765">
      <input type="text" id="player-name" placeholder="请输入你的名字（最多8个汉字）" value="" maxlength="16">
      <button class="menu-btn primary" id="btn-connect">连接服务器</button>
      <button class="menu-btn secondary" id="btn-back">返回</button>
    </div>
    
    <div id="game-ui">
      <button id="back-btn">← 返回菜单</button>
      <div id="player-count">玩家: 1</div>
      <div id="snowball-count">⚪ 0 / 20</div>
      <div id="consecutive-count">连续攒雪球 x0</div>
      <div id="gather-countdown">0.0s</div>
      <div id="charge-indicator" style="display: none;">
        <div id="charge-ring-visual"></div>
        <span id="charge-text">蓄力中...</span>
      </div>
      <div id="gather-progress-bar">
        <div id="gather-progress-fill"></div>
      </div>
      <div id="stamina-bar">
        <div id="stamina-fill"></div>
      </div>
      <div id="controls-hint">
        WASD 移动 · 鼠标 视角 · 空格 加速 · 右键(按住)连续攒雪球 · 左键(按住)蓄力投掷
      </div>
      <div id="pointer-lock-hint">点击屏幕锁定鼠标控制视角</div>
    </div>
    
    <div id="touch-controls">
      <div class="left-controls">
        <div id="gather-btn">
          <span>攒雪球</span>
        </div>
        <div class="joystick" id="move-joystick">
          <div class="joystick-knob" id="move-knob"></div>
          <span class="joystick-label">移动</span>
        </div>
      </div>
      <div class="right-controls">
        <div id="throw-btn">
          <span>投掷</span>
          <div id="charge-ring"></div>
        </div>
        <div id="sprint-btn">
          <span>加速</span>
        </div>
        <div class="joystick" id="look-joystick">
          <div class="joystick-knob" id="look-knob"></div>
          <span class="joystick-label">视角</span>
        </div>
      </div>
    </div>
  </div>
  
  <script type="module" src="/client/main.js"></script>
</body>
</html>
